# general settings
name: DSNet
model_type: RAWRGBIDModel
num_gpu: 2  # set num_gpu: 0 for cpu mode
find_unused_parameters: False
manual_seed: 12



datasets:
  train:
    name: TMM22
    type: RAWRGBIDPairedImageDataset
    dataroot_gt_rgb: ./dataset/raw_moire_image_dataset/trainset/gt_RGB
    dataroot_gt_raw: ./dataset/raw_moire_image_dataset/trainset/gt_RAW_npz
    dataroot_lq_rgb: ./dataset/raw_moire_image_dataset/trainset/moire_RGB
    dataroot_lq_raw: ./dataset/raw_moire_image_dataset/trainset/moire_RAW_npz
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: false

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 10
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: MultiFrameVD
    type: RAWRGBIDPairedImageDataset
    dataroot_gt_rgb: ./dataset/raw_moire_image_dataset/testset/gt_RGB
    dataroot_gt_raw: ./dataset/raw_moire_image_dataset/testset/gt_RAW_npz
    dataroot_lq_rgb: ./dataset/raw_moire_image_dataset/testset/moire_RGB
    dataroot_lq_raw: ./dataset/raw_moire_image_dataset/testset/moire_RAW_npz
    io_backend:
      type: disk
    batch_size: 6
    num_worker: 8

# network structures
network_g:
  type: DSNet

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: AdamW
    lr: !!float 1e-3
    weight_decay: 0
    betas: [0.9, 0.999]

  use_grad_clip: true

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [46000, 204000]       
    restart_weights: [1,1]
    eta_mins: [0.003,0.000001]   


  total_iter: 1000000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 2000
  save_img: true

  metrics:
    psnr:
      type: calculate_psnr_pt
      crop_border: 0
    ssim:
      type: calculate_ssim_pt
      crop_border: 0
    lpips:
      type: calculate_vd_lpips

# logging settings
logger:
  print_freq: 500
  save_checkpoint_freq: !!float 2000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

